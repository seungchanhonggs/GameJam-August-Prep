<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#121619">
  <title>Night Shift Factory</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="game-frame" aria-label="Night Shift Factory prototype">
      <header class="hud">
        <div class="brand-block">
          <span class="shift-label">PLANT 07 / NIGHT SHIFT</span>
          <strong>NIGHT SHIFT</strong>
        </div>
        <div class="stat-block">
          <span>SCORE</span>
          <strong id="scoreValue">000000</strong>
        </div>
        <div class="stat-block time-block">
          <span>SHIFT</span>
          <strong id="timeValue">60.0</strong>
        </div>
      </header>

      <section class="order-strip" aria-label="current order">
        <div class="order-heading">
          <span>ORDER</span>
          <strong id="orderNumber">#A-01</strong>
        </div>
        <div class="order-parts" id="orderParts"></div>
        <div class="combo-block">
          <span>CHAIN</span>
          <strong id="comboValue">x1</strong>
        </div>
      </section>

      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="gameCanvas" width="720" height="1060" aria-label="factory floor"></canvas>
        <button class="pause-button" id="pauseButton" type="button" aria-label="pause">Ⅱ</button>
        <div class="toast" id="toast" aria-live="polite"></div>
      </div>

      <footer class="control-deck">
        <div class="heat-panel">
          <div class="heat-label">
            <span>CORE TEMP</span>
            <strong id="heatValue">18°</strong>
          </div>
          <div class="heat-track"><div id="heatFill"></div></div>
        </div>
        <button class="boost-button" id="boostButton" type="button" aria-label="hold to boost production">
          <span class="boost-icon">⚡</span>
          <span>BOOST</span>
        </button>
      </footer>

      <div class="screen-overlay" id="startOverlay">
        <div class="title-lockup">
          <span>PLANT 07</span>
          <h1>NIGHT<br>SHIFT</h1>
          <p>60 SECOND PRODUCTION RUN</p>
        </div>
        <div class="route-preview" aria-hidden="true">
          <i class="part copper"></i><b>→</b><i class="machine copper"></i>
          <i class="part coolant"></i><b>→</b><i class="machine coolant"></i>
          <i class="part circuit"></i><b>→</b><i class="machine circuit"></i>
        </div>
        <button class="primary-button" id="startButton" type="button">교대 시작</button>
      </div>

      <div class="screen-overlay hidden" id="pauseOverlay">
        <div class="result-card compact">
          <span class="result-kicker">SHIFT PAUSED</span>
          <h2>일시정지</h2>
          <button class="primary-button" id="resumeButton" type="button">계속하기</button>
          <button class="secondary-button" id="restartFromPause" type="button">다시 시작</button>
        </div>
      </div>

      <div class="screen-overlay hidden" id="resultOverlay">
        <div class="result-card">
          <span class="result-kicker">SHIFT REPORT</span>
          <h2 id="resultGrade">B</h2>
          <div class="report-grid">
            <span>FINAL SCORE</span><strong id="finalScore">0</strong>
            <span>ORDERS</span><strong id="finalOrders">0</strong>
            <span>BEST CHAIN</span><strong id="finalCombo">0</strong>
            <span>SCRAP</span><strong id="finalScrap">0</strong>
          </div>
          <button class="primary-button" id="restartButton" type="button">다음 교대</button>
        </div>
      </div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
